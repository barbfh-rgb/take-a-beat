<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Take a Beat with Barb</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gabriela&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #B76E79;
    --cream: #FFF8EC;
    --panel: #FFFEF6;
    --rose: #B76E79;
    --ink: #3A2429;
    --ink-soft: rgba(58, 36, 41, 0.72);
    --shadow-tint: rgba(58, 36, 41, 0.12);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    min-height: 100vh;
    background: var(--cream);
    color: var(--ink);
    font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1.25rem 3rem;
  }

  h1, h2 {
    font-family: 'Gabriela', Georgia, serif;
    font-weight: 400;
    margin: 0;
    color: var(--ink);
  }

  h1 {
    font-size: clamp(1.9rem, 5vw, 2.9rem);
    text-align: center;
  }

  .subtitle {
    margin: 1.1rem 0 0;
    text-align: center;
    color: var(--ink-soft);
    font-size: 1.05rem;
    letter-spacing: 0.02em;
    line-height: 1.5;
  }

  .today-date {
    margin: 1.2rem 0 0;
    text-align: center;
    color: var(--ink-soft);
    font-size: 0.85rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    line-height: 1.5;
  }

  .moon-line {
    margin: 0.7rem 0 0;
    text-align: center;
    color: var(--ink-soft);
    font-size: 0.95rem;
    font-style: italic;
    line-height: 1.5;
  }

  .seasonal-line {
    margin: 0.6rem 0 0;
    text-align: center;
    color: var(--rose);
    font-size: 0.85rem;
    letter-spacing: 0.03em;
    line-height: 1.5;
  }

  .seasonal-line:empty {
    display: none;
  }

  .mode-button.is-suggested::after {
    content: " ✦";
  }

  .app-shell {
    width: min(920px, 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
    margin-top: 2rem;
  }

  .mode-row, .control-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
    justify-content: center;
  }

  button {
    font: inherit;
    cursor: pointer;
    border: 2px solid var(--gold);
    background: transparent;
    color: var(--ink);
    border-radius: 999px;
    padding: 0.6rem 1.3rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    min-height: 44px;
    transition: background-color 160ms ease, transform 160ms ease, color 160ms ease;
  }

  button:hover {
    background: rgba(183, 110, 121, 0.14);
  }

  button:active {
    transform: translateY(1px);
  }

  .mode-button.is-active {
    background: var(--gold);
    color: var(--cream);
  }

  .mode-button[data-mode="liminal"].is-active {
    background: var(--rose);
    border-color: var(--rose);
  }

  .draw-button {
    background: var(--gold);
    color: var(--cream);
    border-color: var(--gold);
    font-size: 1.1rem;
    padding: 0.7rem 1.8rem;
  }

  .draw-button:hover {
    background: #9c5b65;
  }

  .reset-button {
    border-color: var(--rose);
    color: var(--rose);
  }

  .reset-button:hover {
    background: rgba(183, 110, 121, 0.12);
  }

  .seed-details {
    position: fixed;
    top: 0.75rem;
    right: 0.75rem;
    z-index: 50;
    text-align: right;
  }

  .seed-details[open] {
    background: var(--panel);
    border: 2px solid var(--gold);
    border-radius: 12px;
    padding: 0.75rem;
  }

  .seed-details summary {
    cursor: pointer;
    font-size: 1rem;
    color: var(--ink-soft);
    opacity: 0.45;
    list-style: none;
    width: fit-content;
    margin: 0 0 0 auto;
  }

  .seed-details summary::-webkit-details-marker {
    display: none;
  }

  .seed-details summary:hover {
    opacity: 0.8;
  }

  .seed-details .control-row {
    margin-top: 0.75rem;
    justify-content: flex-end;
  }

  .seed-line {
    font-size: 0.85rem;
    color: var(--ink-soft);
    text-align: center;
    margin-top: 0.5rem;
  }

  .seed-input {
    font: inherit;
    padding: 0.5rem 0.7rem;
    border-radius: 8px;
    border: 2px solid var(--gold);
    background: var(--panel);
    color: var(--ink);
    width: 12rem;
  }

  .stage {
    width: 100%;
    min-height: 320px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 1.5rem;
    padding: 1rem;
  }

  .stage.is-liminal {
    filter: saturate(0.85);
  }

  .stage-watermark {
    width: 200px;
    max-width: 55%;
    pointer-events: none;
    user-select: none;
  }

  .card {
    width: 220px;
    max-width: 40vw;
    aspect-ratio: 3 / 4;
    border: 3px solid var(--gold);
    border-radius: 20px;
    background: var(--panel);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    padding: 1.2rem;
    box-shadow: 0 18px 40px var(--shadow-tint);
    opacity: 0;
    transform: scale(0.92);
  }

  .card.is-revealed {
    animation: reveal 650ms ease forwards;
  }

  @keyframes reveal {
    to { opacity: 1; transform: scale(1); }
  }

  .card.is-liminal-card {
    border-color: var(--rose);
    box-shadow: 0 14px 34px rgba(183, 110, 121, 0.18);
  }

  .card-icon {
    width: 88px;
    height: 88px;
    color: var(--gold);
  }

  .is-liminal-card .card-icon {
    color: var(--rose);
  }

  .card-icon svg {
    width: 100%;
    height: 100%;
  }

  .card-number {
    font-family: 'Gabriela', Georgia, serif;
    font-size: 1.4rem;
    text-align: center;
    margin: 0.3rem 0 0;
    padding: 0;
    color: var(--rose);
    font-weight: 600;
    line-height: 1;
  }

  .card-phrase {
    font-family: 'Gabriela', Georgia, serif;
    font-size: 1.25rem;
    text-align: center;
    line-height: 1.3;
    color: var(--ink);
  }

  .card-label {
    font-size: 0.75rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }

  .bridge {
    width: 90px;
    max-width: 12vw;
    height: 4px;
    align-self: center;
    border-radius: 4px;
    background: linear-gradient(to right, transparent, var(--rose), transparent);
    opacity: 0;
  }

  .bridge.is-revealed {
    animation: bridgeReveal 900ms ease forwards;
  }

  @keyframes bridgeReveal {
    to { opacity: 1; }
  }

  body.is-locked > *:not(.gate) {
    display: none;
  }

  .gate {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 999;
    background: var(--cream);
    align-items: center;
    justify-content: center;
  }

  body.is-locked .gate {
    display: flex;
  }

  .gate-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
    padding: 2rem 2.2rem;
    border: 2px solid var(--gold);
    border-radius: 16px;
    background: var(--panel);
    box-shadow: 0 18px 40px var(--shadow-tint);
    width: min(90vw, 20rem);
  }

  .gate-label {
    font-family: 'Gabriela', Georgia, serif;
    font-size: 1.15rem;
    margin: 0;
    color: var(--ink);
  }

  .gate-input {
    font: inherit;
    width: 100%;
    padding: 0.6rem 0.8rem;
    border-radius: 8px;
    border: 2px solid var(--gold);
    background: var(--panel);
    color: var(--ink);
    text-align: center;
    outline: none;
  }

  .gate-input:focus {
    outline: 2px solid var(--rose);
    outline-offset: 2px;
  }

  .gate-button {
    width: 100%;
  }

  .gate-error {
    margin: 0;
    min-height: 1.2em;
    color: var(--rose);
    font-size: 0.85rem;
  }

  .flow-line {
    font-family: 'Gabriela', Georgia, serif;
    font-size: clamp(1.3rem, 3.4vw, 1.9rem);
    text-align: center;
    color: var(--ink);
    max-width: 46rem;
    min-height: 2.4em;
    line-height: 1.5;
  }

  .stage.is-liminal ~ .flow-line,
  .flow-line.is-liminal {
    color: var(--rose);
    font-style: italic;
  }

  .reading-greeting {
    font-family: 'Gabriela', Georgia, serif;
    font-size: 1.2rem;
    text-align: center;
    color: var(--ink);
    margin: 0;
  }

  .reading-signoff {
    font-family: 'Gabriela', Georgia, serif;
    font-style: italic;
    font-size: 1.1rem;
    text-align: center;
    color: var(--rose);
    margin: 0;
  }

  .reading-panel {
    width: min(46rem, 100%);
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .reading-panel:empty {
    display: none;
  }

  .reading-entry {
    border: 2px solid var(--gold);
    border-radius: 14px;
    background: var(--panel);
    padding: 1.1rem 1.4rem;
    box-shadow: 0 10px 24px var(--shadow-tint);
  }

  .reading-entry h3 {
    font-family: 'Gabriela', Georgia, serif;
    font-weight: 400;
    font-size: 1.15rem;
    margin: 0 0 0.45rem;
    color: var(--rose);
  }

  .reading-entry p {
    margin: 0;
    line-height: 1.6;
    color: var(--ink);
  }

  .empty-state {
    color: var(--ink-soft);
    font-style: italic;
    text-align: center;
  }

  @media (max-width: 640px) {
    .card {
      width: 42vw;
    }
  }
</style>
</head>
<body class="is-locked">

  <div class="gate" id="gate">
    <form class="gate-box" id="gate-form">
      <label class="gate-label" for="gate-name">Your name</label>
      <input class="gate-input" id="gate-name" type="text" autocomplete="off" placeholder="So Barbara can address your reading personally" required>
      <label class="gate-label" for="gate-input">Enter passcode</label>
      <input class="gate-input" id="gate-input" type="password" autocomplete="off" autocapitalize="off" spellcheck="false" required>
      <button class="gate-button" type="submit">Enter</button>
      <p class="gate-error" id="gate-error"></p>
    </form>
  </div>

  <h1>Take a Beat with Barb</h1>
  <p class="subtitle">Join me for a moment</p>
  <p class="today-date" id="today-date"></p>
  <p class="moon-line" id="moon-line"></p>
  <p class="seasonal-line" id="seasonal-line"></p>

  <div class="app-shell">
    <div class="mode-row" role="group" aria-label="Reading mode">
      <button class="mode-button" type="button" data-mode="1">1 Card</button>
      <button class="mode-button" type="button" data-mode="3">3 Cards</button>
      <button class="mode-button" type="button" data-mode="5">5 Cards</button>
      <button class="mode-button" type="button" data-mode="liminal">Liminal</button>
    </div>

    <div class="control-row">
      <button class="draw-button" type="button" id="draw-btn">Draw</button>
      <button class="reset-button" type="button" id="reset-btn">Clear</button>
    </div>

    <details class="seed-details">
      <summary>⚙</summary>
      <div class="control-row">
        <input class="seed-input" type="text" id="seed-input" placeholder="Seed for a retake (optional)">
      </div>
      <p class="seed-line" id="seed-line">No draw yet.</p>
    </details>

    <div class="stage" id="stage"></div>

    <p class="flow-line" id="flow-line"></p>

    <div class="reading-panel" id="reading-panel"></div>
  </div>

  document.getElementById("gate-form").addEventListener("submit", (e) => {

      error.textContent = "Not quite, try again.";
      input.value = "";
      input.focus();

    { id: 35, phrase: "Open to receive", icon: '<path d="M15 55 C 25 70 40 72 50 60 C 60 72 75 70 85 55"/><path d="M15 55 C 15 45 22 40 28 45"/><path d="M85 55 C 85 45 78 40 72 45"/>' },
    { id: 36, phrase: "Trust the unfolding", icon: '<path d="M50 85 C 50 60 30 60 30 40 C 30 25 45 20 55 30"/><circle cx="55" cy="30" r="4" fill="currentColor" stroke="none"/>' }
  ];

  // ---- overall meanings, shown with each drawn card --------------------

  const MEANINGS = {
    1: "The whole practice begins here, with one deliberate pause before anything else happens. Drawn alone it is a complete instruction for the day. In a larger spread it marks the opening beat, the breath you take before the rest of the reading unfolds. Nothing is lost by waiting a moment longer.",
    2: "This card asks you to notice that you are already where you need to be. It often appears when attention has been living in the past or the future rather than in the room you are standing in. Wherever it falls in a spread, it invites you to greet the present before you try to change it.",
    3: "Something in you has been carried for a while and is ready to come down gently. This card favours a soft landing over another push forward and rest over effort. Near the start of a spread it eases you in; near the end it shows you how to finish softly.",
    4: "This is the card of returning to yourself, to the part of you that has nothing to prove and nothing to perform. It tends to surface when you have been pulled in too many directions and have started to feel far from your own centre. Let it point you back towards whatever helps you feel most fully yourself.",
    5: "Attention is the offering here. The card asks you to rest your gaze on what is actually happening, not on the story of what should be happening. In any spread it acts as a quiet witness, sharpening every card around it by asking you to look again.",
    6: "You are being invited to get comfortable and to stop hovering by the door of your own life. There is no rush to leave and nothing to escape. When this card appears the reading wants you to stay a while, so give yourself permission to be at ease before you go further.",
    7: "The breath here is whole and unguarded, all the way in and all the way out. This card often points to a place where you have been holding back, keeping something small that wants more room. Let the breath widen first and the rest tends to follow.",
    8: "Pace is the message of this card. You may take longer than you think you need, over the breath and over everything else. In a spread it softens whatever sits beside it, reminding you that very little is truly urgent.",
    9: "This card arrives carrying permission to put the day down. Each breath out can take a little of its weight with it, and not everything that happened today needs to travel into tomorrow. Late in a spread it makes a gentle closing note; early on it clears the ground for what follows.",
    10: "Here the invitation is to take in, deeply and without apology. The card asks what nourishes you, what restores you and what helps you feel more alive, then asks you to make room for more of it. Draw the breath in fully and let your whole chest widen to hold it.",
    11: "The chatter is not you, and this card knows it. Every exhale can carry away a little of the mental noise, the worries and the outside voices that have been talking over your own. Even a few seconds of quiet counts, so take them.",
    12: "Between one breath and the next there is a small gap, and this card lives there. It asks you to rest in the spaces between doing, speaking and solving rather than rushing to fill them. In a spread it often marks the still point the whole reading turns around.",
    13: "This is the kindness card. It asks you to offer yourself the same tenderness you would give someone you love who was struggling, without needing to earn it first. Wherever it lands it softens the reading and asks how you might treat yourself more gently here.",
    14: "Something has been held tight and is ready to loosen, even slightly, even briefly. This card points to strain you may have been carrying alone and asks whether all of it is truly yours to hold. Let the tight places ease a little on the next breath out.",
    15: "Gripping and bracing are the habits this card notices. Somewhere in the body, or somewhere in the week, you are holding on harder than the moment requires. Loosen your hold a little and see what actually falls, because it is usually far less than feared.",
    16: "Whatever has gone hard in you has probably been protecting something tender. This card honours the effort of that protection and gently asks whether it is still needed at full strength. Allowing a little yield does not mean giving in.",
    17: "Warmth is the medicine here. Imagine it spreading through anything stiff, resistant or braced, and notice what becomes easier when tenderness is allowed into the room. This card often appears when pleasure and softness have been waiting politely for an invitation.",
    18: "How you look changes what you see. This card asks you to rest your eyes rather than stare, and to let the whole face ease along with them. Turned outwards it gentles how you see other people; turned inwards it gentles how you see yourself.",
    19: "You have been holding something, and this card names the moment of setting it down. The release does not have to be forever; even putting it down for today changes the shape of the day. Notice how much lighter the reading feels once this card has spoken.",
    20: "This card offers a resting place for whatever you have been carrying. Nothing is being thrown away; you may place it somewhere safe and collect it again when you have the strength and the reason. Until then, your hands and your mind are allowed to be empty.",

    24: "You have been filled past comfort, with tasks, feelings or other people's needs. This card pours a little of it out to make space for something quieter. An empty cup is not a loss; it is room.",

    26: "The whole world does not need solving today. Choose one point to rest your attention on and let the edges blur in whatever order they wish. Much of what overwhelms becomes manageable the moment it stops being everything at once.",
    27: "Of all the breaths you will take today, this card asks for just one to be chosen on purpose. When the mind races ahead, this single breath is the way back. It is a small door into the present, and it is always open.",
    28: "Steadiness is available, even now. Find one reliable thing, a sound, a breath or a feeling, and let it hold you in place while everything else moves. This card often appears in uncertain weeks to remind you that you do not have to be still everywhere, only somewhere.",
    29: "Minds wander; that is simply what they do. This card is the gentle hand on the shoulder that brings yours back without a word of judgement. Whatever the present moment actually needs is far smaller and kinder than what the wandering imagined.",
    30: "Uncertainty is present and you are being asked to stay anyway. This card does not demand confidence, only steadiness, the small practices, boundaries and rhythms that keep you grounded while things resolve. Trust that steadiness grows through being practised.",

  DECK.forEach((card) => { card.meaning = MEANINGS[card.id]; });

  // ---- deterministic seeded shuffle -----------------------------------

  function hashStringToSeed(str) {
    let h1 = 1779033703 ^ str.length;
    for (let i = 0; i < str.length; i++) {
      h1 = Math.imul(h1 ^ str.charCodeAt(i), 3432918353);
      h1 = (h1 << 13) | (h1 >>> 19);
    }
    return function () {
      h1 = Math.imul(h1 ^ (h1 >>> 16), 2246822507);
      h1 = Math.imul(h1 ^ (h1 >>> 13), 3266489909);
      h1 ^= h1 >>> 16;
      return h1 >>> 0;
    };
  }

  function mulberry32(seedInt) {
    let a = seedInt;
    return function () {
      a |= 0;
      a = (a + 0x6d2b79f5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  function seededShuffle(array, seedString) {
    const seedFn = hashStringToSeed(String(seedString));
    const rng = mulberry32(seedFn());
    const result = array.slice();
    for (let i = result.length - 1; i > 0; i--) {
      const j = Math.floor(rng() * (i + 1));
      [result[i], result[j]] = [result[j], result[i]];
    }
    return result;
  }

  function newSeed() {
    return `${Date.now()}-${Math.floor(Math.random() * 1e9)}`;
  }

  // ---- moon phase -> suggested mode ------------------------------------
  // New Moon -> 1 Card, Waxing/First Quarter -> 3 Cards,
  // Full Moon -> 5 Cards, Waning/Last Quarter -> Liminal.

  function getMoonPhaseFraction(date) {
    const synodicMonth = 29.53058867;
    const knownNewMoon = Date.UTC(2000, 0, 6, 18, 14, 0);
    const diffDays = (date.getTime() - knownNewMoon) / 86400000;
    let phase = (diffDays % synodicMonth) / synodicMonth;
    if (phase < 0) phase += 1;
    return phase;
  }

  function moonPhaseInfo(phase) {
    const phases = [
      { max: 0.03, name: "New Moon", emoji: "🌑" },
      { max: 0.22, name: "Waxing Crescent", emoji: "🌒" },
      { max: 0.28, name: "First Quarter", emoji: "🌓" },
      { max: 0.47, name: "Waxing Gibbous", emoji: "🌔" },
      { max: 0.53, name: "Full Moon", emoji: "🌕" },
      { max: 0.72, name: "Waning Gibbous", emoji: "🌖" },
      { max: 0.78, name: "Last Quarter", emoji: "🌗" },
      { max: 0.97, name: "Waning Crescent", emoji: "🌘" },
      { max: 1.01, name: "New Moon", emoji: "🌑" }
    ];
    return phases.find((p) => phase <= p.max);
  }

  function suggestedModeForPhase(phase) {
    if (phase < 0.25) return "1";
    if (phase < 0.5) return "3";
    if (phase < 0.75) return "5";
    return "liminal";
  }

  // ---- seasonal wheel (extracted from Barbara's own wheel diagram) ------
  // Month is 0-indexed (0 = January) to match JS Date conventions.

  const SEASONAL_MARKERS = [
    { name: "Yule / Winter Solstice", month: 11, day: 21 },
    { name: "Imbolc", month: 1, day: 1 },
    { name: "Spring Equinox", month: 2, day: 20 },
    { name: "Beltane", month: 4, day: 1 },
    { name: "Midsummer Solstice", month: 5, day: 21 },
    { name: "Lughnasadh", month: 7, day: 1 },
    { name: "Autumn Equinox", month: 8, day: 22 },
    { name: "Samhain", month: 9, day: 31 }
  ];

  function findSeasonalWeek(date) {
    const oneDay = 86400000;
    for (const marker of SEASONAL_MARKERS) {
      // check the marker date in the previous, current and next year so
      // dates near 31 Dec / 1 Jan still match correctly across the boundary
      for (const yearOffset of [-1, 0, 1]) {
        const markerDate = new Date(date.getFullYear() + yearOffset, marker.month, marker.day);
        const diffDays = Math.abs((date - markerDate) / oneDay);
        if (diffDays <= 7) {
          return marker.name;
        }
      }
    }
    return null;
  }

  // ---- state -----------------------------------------------------------

  const moonPhase = getMoonPhaseFraction(new Date());
  const moonInfo = moonPhaseInfo(moonPhase);
  const seasonalWeek = findSeasonalWeek(new Date());
  let mode = suggestedModeForPhase(moonPhase);

  const modeButtons = Array.from(document.querySelectorAll(".mode-button"));
  const stage = document.getElementById("stage");
  const flowLine = document.getElementById("flow-line");
  const seedInput = document.getElementById("seed-input");
  const seedLine = document.getElementById("seed-line");
  const readingPanel = document.getElementById("reading-panel");

  document.getElementById("today-date").textContent = new Date().toLocaleDateString(undefined, {
    weekday: "long",
    year: "numeric",
    month: "long",
    day: "numeric"
  });

  document.getElementById("moon-line").textContent = `${moonInfo.emoji} ${moonInfo.name}`;

  if (seasonalWeek) {
    document.getElementById("seasonal-line").textContent = `✦ ${seasonalWeek} week`;
  }

  modeButtons.forEach((button) => {
    button.classList.toggle("is-active", button.dataset.mode === mode);
    button.classList.toggle("is-suggested", button.dataset.mode === mode);
    button.addEventListener("click", () => {
      mode = button.dataset.mode;
      modeButtons.forEach((b) => b.classList.toggle("is-active", b === button));
      resetStage();
    });
  });

  function cardIconSVG(card) {
    return `<svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">${card.icon}</svg>`;
  }

  function buildCardEl(card, label, extraClass) {
    const el = document.createElement("div");
    el.className = "card" + (extraClass ? ` ${extraClass}` : "");
    el.innerHTML = `
      ${label ? `<span class="card-label">${label}</span>` : ""}
      <div class="card-icon">${cardIconSVG(card)}</div>
      <p class="card-number">${card.id}</p>
      <p class="card-phrase">${card.phrase}</p>
    `;
    return el;
  }

  function revealAll(stageEl) {
    requestAnimationFrame(() => {
      stageEl.querySelectorAll(".card, .bridge").forEach((el, i) => {
        setTimeout(() => el.classList.add("is-revealed"), i * 180);
      });
    });
  }

  function resetStage() {
    stage.className = "stage";
    stage.innerHTML = `<img class="stage-watermark" src="${WATERMARK_DATA_URI}" alt="">`;
    flowLine.textContent = "";
    flowLine.classList.remove("is-liminal");
    seedLine.textContent = "No draw yet.";
    readingPanel.innerHTML = "";
  }

  function panelLine(className, text) {
    const line = document.createElement("p");
    line.className = className;
    line.textContent = text;
    return line;
  }

  function meaningEntry(card, label) {
    const entry = document.createElement("div");
    entry.className = "reading-entry";
    const heading = document.createElement("h3");
    heading.textContent = label ? `${label}: ${card.id}. ${card.phrase}` : `${card.id}. ${card.phrase}`;
    const body = document.createElement("p");
    body.textContent = card.meaning;
    entry.append(heading, body);
    return entry;
  }

  function draw() {
    const seed = seedInput.value.trim() || newSeed();
    seedInput.value = seed;
    seedLine.textContent = `Seed: ${seed}. Save this to redraw the exact same reading later.`;

    const buyerName = getBuyerName();
    readingPanel.innerHTML = "";
    readingPanel.append(panelLine("reading-greeting", `Dear ${buyerName || "Friend"},`));

    stage.innerHTML = "";
    flowLine.textContent = "";
    flowLine.classList.remove("is-liminal");
    stage.classList.remove("is-liminal");

    if (mode === "liminal") {
      const ids = seededShuffle(DECK.map((c) => c.id), seed).slice(0, 2);
      const leaving = DECK.find((c) => c.id === ids[0]);
      const arriving = DECK.find((c) => c.id === ids[1]);

      stage.classList.add("is-liminal");
      const leavingCard = buildCardEl(leaving, null, "is-liminal-card");
      const bridge = document.createElement("div");
      bridge.className = "bridge";
      const arrivingCard = buildCardEl(arriving, null, "is-liminal-card");

      stage.append(leavingCard, bridge, arrivingCard);
      revealAll(stage);

      flowLine.classList.add("is-liminal");
      flowLine.textContent = `${leaving.phrase}… and ${arriving.phrase.charAt(0).toLowerCase()}${arriving.phrase.slice(1)}.`;

      readingPanel.append(meaningEntry(leaving, "Leaving"), meaningEntry(arriving, "Arriving"));
      readingPanel.append(panelLine("reading-signoff", "Love Barbara x"));
      return;
    }

    const count = Number(mode);
    const ids = seededShuffle(DECK.map((c) => c.id), seed).slice(0, count);
    const cards = ids.map((id) => DECK.find((c) => c.id === id));

    cards.forEach((card) => stage.append(buildCardEl(card)));
    cards.forEach((card) => readingPanel.append(meaningEntry(card)));
    readingPanel.append(panelLine("reading-signoff", "Love Barbara x"));
    revealAll(stage);

    if (count === 1) {
      flowLine.textContent = cards[0].phrase + ".";
    } else {
      flowLine.textContent = cards.map((c) => c.phrase).join(". ") + ".";
    }
  }

  document.getElementById("draw-btn").addEventListener("click", draw);
  document.getElementById("reset-btn").addEventListener("click", () => {
    seedInput.value = "";
    resetStage();
  });

  resetStage();
</script>
